# AGGRESSOR wrappers configuration
# Edit weights/thresholds here; no code changes required for retuning.

[cache]
# Raw copies: cache/{protein_id}/{predictor}/raw.{ext} (only with CLI --keep-cache)
root = cache
enabled = false

[pipeline]
# Default predictors for aggressor-wrappers / aggressor-wrappers.py (comma-separated).
predictors = path,appnn,waltz,pasta,archcandy,crossbeta,aggreprot

[metascore]
method = weighted_sum
# Active preset (override with AGGRESSOR_METASCORE_PRESET env var):
preset = predictor_specificity

# Metascore uses 7 predictors; AggreProt is in the pipeline but not weighted yet.
# Keys match predictor registry (schema.py).

[metascore.presets.functional_amyloids]
# Functional amyloid emphasis — higher WALTZ / PATH / APPNN / PASTA
waltz = 0.24
path = 0.22
appnn = 0.20
crossbeta = 0.10
pasta = 0.16
archcandy = 0.05
aggrescan = 0.03

[metascore.presets.pathogenic_amyloids]
# Pathogenic amyloid emphasis — higher Cross-Beta / APPNN / PATH
waltz = 0.17
path = 0.18
appnn = 0.19
crossbeta = 0.20
pasta = 0.14
archcandy = 0.08
aggrescan = 0.04

[metascore.presets.predictor_specificity]
# Conservative weights by tool specificity (default)
waltz = 0.22
path = 0.20
appnn = 0.19
crossbeta = 0.15
pasta = 0.15
archcandy = 0.06
aggrescan = 0.03

[predictors.path]
threshold_percentile = 75.0

[predictors.appnn]
score_threshold = 0.5

[predictors.pasta]
energy_threshold = -2.8

[predictors.aggreprot]
# Binarisation cutoff (legacy notebook: 0.25). Live loschmidt API: RPL27 BHT bins
# match at 0.24 on fresh runs; stored BHT scores peak at 0.25 in the 0.20–0.30 range.
aggregation_threshold = 0.25

[runners.aggreprot]
# AggreProt web service (https://loschmidt.chemi.muni.cz/aggreprot/)
base_url = https://loschmidt.chemi.muni.cz/aggreprot
poll_interval_seconds = 3
timeout_seconds = 1800
verify_ssl = false
# Up to 3 sequences per API job (site limit); unique FASTA headers required.
sequences_per_run = 3

[predictors.crossbeta]
# Binarisation threshold; legacy BHT tables used 0.54 (not the web default 0.5).
confidence_threshold = 0.54

[runners.crossbeta]
# Cross-Beta web service (https://bioinfo.crbm.cnrs.fr/crossBetaPred/)
base_url = https://bioinfo.crbm.cnrs.fr/
threshold = 0.54
window_size = auto
poll_interval_seconds = 2
timeout_seconds = 600
verify_ssl = false
parallel_jobs = 2
sequences_per_run = 1

[predictors.archcandy]
# Per-residue score mode matches ArchCandy web UI default tab: cumulative (sum of regions).
score_mode = cumulative

[runners.archcandy]
# ArchCandy web service (https://bioinfo.crbm.cnrs.fr/archCandy-input)
base_url = https://bioinfo.crbm.cnrs.fr/
threshold = 0.4
transmembrane = false
poll_interval_seconds = 2
timeout_seconds = 600
verify_ssl = false
# One sequence per API job; optional parallel_jobs for concurrent submissions.
parallel_jobs = 2
sequences_per_run = 1

[predictors.waltz]
# Binary when score != 0

[runners.path]
# Default: vendor/PATH/path1.1.py (bundled). Use conda env `AGGRESSOR` (see environment.yml).
# Override: AGGRESSOR_PATH_SCRIPT, AGGRESSOR_PATH_PYTHON
script =
python = python3
results_filename = results.csv
# 0 = no timeout (PATH can run for hours on long proteins)
timeout_seconds = 0
# Multifasta batching: one sequence per subprocess; up to 2 concurrent PATH runs.
parallel_jobs = 2
sequences_per_run = 1

[runners.appnn]
rscript = Rscript
# Default: package legacy/appnn_converter.R (override with AGGRESSOR_APPNN_SCRIPT)
converter_script =
output_dir = APPNN_parsed
timeout_seconds = 0
# APPNN is fast — all sequences in a single R invocation (omit parallel_jobs / sequences_per_run).

[runners.waltz]
# WALTZ web service (https://waltz.switchlab.org/)
base_url = https://waltz.switchlab.org/
threshold = 92
ph = 7.0
output_format = text_long
timeout_seconds = 180
# Up to 10 sequences per web job (server limit ~10000 letters per POST).
sequences_per_run = 10

[runners.pasta]
# PASTA 2.0 web service (http://old.protein.bio.unipd.it/pasta2/)
base_url = http://old.protein.bio.unipd.it/pasta2/
npair = 22
amount = -2.8
thresdrop = val1
poll_interval_seconds = 10
timeout_seconds = 3600
# Up to 10 sequences per web job (Regular mode).
sequences_per_run = 10
