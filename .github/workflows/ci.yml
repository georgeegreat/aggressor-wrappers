name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # requires-python = ">=3.10"; 3.13 is included because that is what the
        # maintainers actually run locally (miniconda default).
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and dev dependencies
        # The import name `aggressor_wrappers` only exists once the package is
        # installed: pyproject maps it to src/ via package-dir, so a bare checkout
        # cannot import it. Installing is therefore part of the test contract, not
        # a convenience.
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check src/ tests/

      - name: Guard against Cyrillic homoglyphs in source
        # A Cyrillic 'с' (U+0441) is visually identical to Latin 'c' and silently
        # produces an unimportable module name. This is an easy mistake to make on
        # a Russian keyboard layout and is invisible in code review, so it is
        # checked mechanically rather than by eye.
        run: python tools/check_homoglyphs.py

      - name: Test
        run: python -m pytest -v

  version-matches-tag:
    # The version has a single source (src/__init__.py). This asserts a release
    # tag cannot silently disagree with the package it ships.
    if: startsWith(github.ref, 'refs/tags/v')
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -e .
      - name: Assert tag == package version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(python -c "import aggressor_wrappers; print(aggressor_wrappers.__version__)")
          echo "tag=$TAG package=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::tag v$TAG does not match package version $PKG"
            exit 1
          fi
